name: opencode-bridge
version: 0.2.0
description: "Hermes Agent plugin that delegates ALL code work to OpenCode. Dispatches tasks via HTTP API, injects collaboration rules, manages server lifecycle."
author: hann
kind: standalone
platforms:
  - linux
  - macos
  - windows
provides_tools:
  - opencode_dispatch
provides_hooks:
  - on_session_start
  - pre_llm_call
